<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Erydon</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    a {
      display: block;
      line-height: 0;
      text-decoration: none;
    }

    video {
      display: block;
      width: min(90vw, 1100px);
      max-height: 90vh;
      height: auto;
      background: #000;
    }
  </style>
</head>
<body>
  <a href="https://discord.gg/MaqUvVgTFm" target="_blank" rel="noopener noreferrer" aria-label="Open the Erydon Discord server">
    <video autoplay muted loop playsinline preload="auto">
      <source src="logo-loop.mp4" type="video/mp4">
    </video>
  </a>
</body>
</html>
