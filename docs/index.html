<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Erydon</title><meta name="description" content="Join the Erydon Discord community."><style>:root{--bg:#0a0a0d;--panel:rgba(255,255,255,.045);--border:rgba(255,255,255,.1);--text:#f3f0ea;--muted:rgba(243,240,234,.74);--shadow:0 20px 60px rgba(0,0,0,.42)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,rgba(255,255,255,.06),transparent 36%),linear-gradient(180deg,#121319 0%,var(--bg) 100%);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{min-height:100vh;display:grid;place-items:center;padding:24px}main{width:100%;max-width:760px}.card{text-align:center;padding:40px 28px 32px;background:var(--panel);border:1px solid var(--border);border-radius:28px;box-shadow:var(--shadow);backdrop-filter:blur(10px)}.logo-link{display:inline-block;text-decoration:none;border-radius:24px;transition:transform .18s ease,opacity .18s ease}.logo-link:hover{transform:translateY(-2px);opacity:.97}.logo-image{width:min(320px,74vw);height:auto;display:block;margin:0 auto 18px;border-radius:18px;filter:drop-shadow(0 12px 30px rgba(0,0,0,.32))}h1{margin:0 0 10px;font-size:clamp(2rem,4vw,3rem);letter-spacing:.08em;text-transform:uppercase;font-weight:700}p{margin:0;font-size:1.05rem;line-height:1.6;color:var(--muted)}.button{display:inline-block;margin-top:22px;padding:12px 18px;border-radius:999px;border:1px solid var(--border);text-decoration:none;color:var(--text);background:rgba(255,255,255,.04);transition:transform .18s ease,background .18s ease}.button:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}</style></head><body><main><section class="card"><a class="logo-link" href="https://discord.gg/MaqUvVgTFm" target="_blank" rel="noopener noreferrer" aria-label="Open the Erydon Discord server"><img class="logo-image" src="animated-logo.webp" alt="Animated Erydon logo"></a><h1>Erydon</h1><p>Website coming soon.</p><a class="button" href="https://discord.gg/MaqUvVgTFm" target="_blank" rel="noopener noreferrer">Join Discord</a></section></main></body></html>
